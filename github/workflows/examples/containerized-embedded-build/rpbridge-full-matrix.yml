# Example: build everything (firmware × all boards, driver, userspace
# × cross-targets, workspace tests) on push/PR. One workflow file
# fans out into four reusable-workflow calls — exactly one call per
# logical component.
#
# This is the recommended layout for a multi-component embedded repo.
# Each call gets its own concurrency-friendly matrix and its own
# artefact group. They all share the same toolchain image cache via
# the default cache-scope, so the second call onwards in a run finds
# every layer pre-warm.

name: 🐳 CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'driver/**'
      - 'userspace/**'
      - 'tools/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - 'driver/**'
      - 'userspace/**'
      - 'tools/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: 🔥 Firmware
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: firmware
      matrix-variants: |
        [
          { "args": "rpbridge_rp2354b", "id": "rp2354b", "label": "RP2354B" },
          { "args": "rpbridge_pico2",   "id": "pico2",   "label": "Pico 2"  }
        ]

  driver:
    name: 🐧 Driver
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: driver
      matrix-variants: '[{"args":"","id":"kmod","label":"kernel module"}]'
      emit-driver-compat-matrix: true

  userspace:
    name: 💻 Userspace
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: userspace
      matrix-variants: |
        [
          { "args": "--x86_64",  "id": "x86_64",  "label": "x86_64"  },
          { "args": "--aarch64", "id": "aarch64", "label": "AArch64" }
        ]

  workspace-tests:
    name: 🧪 Workspace tests
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: test
      matrix-variants: '[{"args":"","id":"all","label":"fmt + clippy + test"}]'
      attach-firmware-binaries: false
      attach-driver-binary: false
      attach-userspace-binaries: false
