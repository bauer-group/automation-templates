# Example: tag-driven release pipeline. Calls the reusable for each
# component, downloads the resulting artefacts, and publishes a
# GitHub Release with the combined set + an SBOM and CHECKSUMS.

name: 🚀 Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a tagged release mid-flight

permissions:
  contents: write   # publish Release + attach artefacts

jobs:
  firmware:
    name: 🔥 Firmware
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: firmware
      matrix-variants: |
        [
          { "args": "rpbridge_rp2354b", "id": "rp2354b", "label": "RP2354B" },
          { "args": "rpbridge_pico2",   "id": "pico2",   "label": "Pico 2"  }
        ]

  userspace:
    name: 💻 Userspace
    uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
    with:
      component: userspace
      matrix-variants: |
        [
          { "args": "--x86_64",  "id": "x86_64",  "label": "x86_64"  },
          { "args": "--aarch64", "id": "aarch64", "label": "AArch64" }
        ]

  # Driver release is opt-in: flip attach-driver-binary to true when
  # an exact-kernel binary attach (rather than source-build on the
  # target system) becomes a release deliverable.
  #
  # driver:
  #   name: 🐧 Driver
  #   uses: bauer-group/automation-templates/.github/workflows/containerized-embedded-build.yml@main
  #   with:
  #     component: driver
  #     matrix-variants: '[{"args":"","id":"kmod","label":"kernel module"}]'
  #     attach-driver-binary: true

  publish:
    name: 📦 Publish Release
    needs: [firmware, userspace]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: 🗂️ Flatten release artefacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( \
                 -name '*.uf2' -o -name '*.elf' -o -name '*.bin' \
              -o -name '*.hex' -o -name 'rpbridge-ctl*' \
              -o -name 'size.txt' \
          \) -exec cp -v {} release/ \;
          ( cd release && sha256sum * > CHECKSUMS.txt )

      - name: 🧾 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: release/rpbridge-sbom.spdx.json

      - name: 📝 Generate release notes
        shell: bash
        run: |
          {
            echo "## What's Changed"
            PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')
            if [ -n "$PREV" ]; then
              git log --pretty=format:'* %s (%h)' "$PREV"..HEAD
            else
              git log --pretty=format:'* %s (%h)' HEAD -n 50
            fi
            echo ""; echo ""
            echo "## Artefacts"
            echo '* `rpbridge-*.uf2/.elf/.bin/.hex` — firmware images per board.'
            echo '* `rpbridge-ctl*` — userspace CLI (x86_64, aarch64).'
            echo '* `rpbridge-sbom.spdx.json` — SPDX SBOM.'
            echo '* `CHECKSUMS.txt` — SHA-256 of every artefact.'
          } > release_notes.md

      - name: 🚀 Publish
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
