# =============================================================================
# Release Workflow with Pre-Generated Sources (Kiota / OpenAPI / T4)
# =============================================================================
# When the CLI uses build-time code generation (Kiota for OpenAPI clients,
# T4 templates, source generators with external dependencies, ...), running
# the generator once in an upstream job and fanning the result out to every
# RID via an artifact saves N x generator-runtime per release.
#
# For a 3-RID matrix with ~15s of Kiota work each, this saves ~30s per
# release. For 6 RIDs and slower generators, the savings are minutes.
#
# The SAME artifact can also feed dotnet-publish-library.yml in parallel
# (e.g., to ship both a `dotnet tool` and per-OS binaries) — both reusable
# workflows accept identical `download-artifact-name` / `download-artifact-
# path` / `extra-msbuild-properties` inputs.
#
# CRITICAL ordering (handled by the workflow internally — do NOT try to
# replicate this in the caller):
#   checkout -> setup-dotnet -> DOWNLOAD ARTIFACT -> restore -> publish
# MSBuild evaluates <Compile Include="**/*.cs"> ONCE at project load. Files
# appearing on disk later are silently absent from the build.
# =============================================================================

name: 🚀 Release & Publish (with codegen)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force-release:
        description: 'Force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate:
    name: Build & Test
    uses: bauer-group/automation-templates/.github/workflows/dotnet-build.yml@main
    with:
      project-path: 'MyApp.slnx'
      dotnet-version: '10.0.x'
      run-tests: true
    secrets: inherit

  release:
    name: Create Release
    needs: validate
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit

  # ==========================================================================
  # Generate sources ONCE — fan out via artifact
  # ==========================================================================
  # Runs in parallel with `release` after validation. Generates the Kiota
  # client from contracts/openapi.json once and uploads it as an artifact.
  # The downstream `publish-binaries` job downloads this artifact (via the
  # workflow's built-in `download-artifact-name` input) and skips Kiota
  # re-generation locally via `-p:KiotaSkip=true`.
  prepare-sources:
    name: Prepare Generated Sources
    needs: release
    if: needs.release.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore local tools (Kiota)
        run: dotnet tool restore

      - name: Generate CLI client from API contract
        run: |
          dotnet kiota generate \
            --openapi contracts/openapi.json \
            --language CSharp \
            --output src/MyApp.CLI/Generated \
            --namespace-name MyApp.CLI.Generated \
            --class-name MyApiClient \
            --clean-output \
            --exclude-backward-compatible \
            --log-level Warning

      - name: Upload generated sources
        uses: actions/upload-artifact@v7
        with:
          name: cli-generated-sources
          path: src/MyApp.CLI/Generated/
          retention-days: 1
          if-no-files-found: error

  # ==========================================================================
  # Binary publish — consumes the artifact
  # ==========================================================================
  publish-binaries:
    name: Publish Binaries
    needs: [release, prepare-sources]
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/dotnet-publish-binaries.yml@main
    with:
      project-path: 'src/MyApp.CLI/MyApp.CLI.csproj'
      assembly-name: 'myapp'
      version: ${{ needs.release.outputs.version }}

      # Pre-generated sources artifact (replaces in-csproj Kiota run)
      download-artifact-name: 'cli-generated-sources'
      download-artifact-path: 'src/MyApp.CLI/Generated'

      # KiotaSkip=true: the Generated/ folder is pre-populated, in-csproj
      #                 Kiota target has nothing to do — skip it
      # PackAsTool=false: per-RID self-contained binary semantics conflict
      #                   with tool-pack semantics; disable for this publish
      extra-msbuild-properties: '-p:KiotaSkip=true -p:PackAsTool=false'
    secrets: inherit
