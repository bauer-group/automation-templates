# Example: build mkdocs and deploy to GitHub Pages with the
# BAUER GROUP brand applied. The simplest possible consumer.
#
# Project requirements:
#   - mkdocs.yml at docs/mkdocs.yml
#   - pip requirements pinned in docs/requirements.txt
#   - mkdocs.yml has site_dir: ../site (so the build lands at <repo>/site)
#   - mkdocs.yml lists the brand stylesheet under extra_css:
#       extra_css:
#         - assets/_bauer-brand.css
#
# GitHub repo settings:
#   Settings → Pages → Source = "GitHub Actions"

name: 📚 Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  pages:
    uses: bauer-group/automation-templates/.github/workflows/mkdocs-deploy-pages.yml@main
