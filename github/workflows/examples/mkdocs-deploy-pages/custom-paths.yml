# Example: project layout that doesn't follow the reference defaults.
# Used by repos whose docs/ tree, mkdocs config or output dir live
# elsewhere.

name: 📚 Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pages:
    uses: bauer-group/automation-templates/.github/workflows/mkdocs-deploy-pages.yml@main
    with:
      config-file:       documentation/mkdocs.yml
      requirements-file: documentation/requirements.txt
      output-dir:        public
      brand-target-path: documentation/assets/_bauer-brand.css
      python-version:    '3.13'
