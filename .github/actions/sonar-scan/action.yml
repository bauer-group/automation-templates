# =============================================================================
# SonarQube Scan (Server + Cloud)
# =============================================================================
# Thin, cached wrapper around SonarSource/sonarqube-scan-action supporting both
# self-hosted SonarQube Server and SonarQube Cloud (formerly SonarCloud).
# Designed to be opt-in and non-breaking:
#
#   * sonar-edition switches between 'server' (default) and 'cloud'
#   * Auto-skips with a WARNING (never an error) when required inputs are missing
#       - server: needs sonar-host-url + sonar-token
#       - cloud:  needs sonar-token (+ sonar.organization)
#   * Quality Gate is NON-blocking unless fail-on-quality-gate is set
#   * Caches the scanner + analysis data between runs (SONAR_USER_HOME)
#
# Project configuration (projectKey, sources, coverage paths, sonar.organization)
# lives in the consumer repo's `sonar-project.properties` so this action stays
# generic; anything can also be passed via `args`.
#
# Usage (Server):
#   - uses: bauer-group/automation-templates/.github/actions/sonar-scan@main
#     with:
#       sonar-host-url: ${{ secrets.SONARQUBE_HOST_URL }}
#       sonar-token:    ${{ secrets.SONARQUBE_TOKEN }}
#
# Usage (Cloud):
#   - uses: bauer-group/automation-templates/.github/actions/sonar-scan@main
#     with:
#       sonar-edition:      cloud
#       sonar-token:        ${{ secrets.SONARQUBE_TOKEN }}
#       sonar-organization: my-org-key
#
# Note: SonarSource/sonarqube-scan-action runs on Linux runners only. For .NET/C#
#       full coverage use the dotnet-sonarscanner begin/end flow instead.
#
# References:
#   - https://github.com/SonarSource/sonarqube-scan-action
# =============================================================================

name: 'SonarQube Scan'
description: 'SonarQube Server or Cloud analysis with caching, opt-in auto-skip and non-blocking Quality Gate'
author: 'BAUER GROUP'

inputs:
  sonar-edition:
    description: "Target platform: 'server' (self-hosted) or 'cloud' (SonarQube Cloud)"
    required: false
    default: 'server'
  sonar-host-url:
    description: 'SonarQube Server URL (server edition). Leave empty for Cloud.'
    required: false
    default: ''
  sonar-token:
    description: 'SonarQube analysis token. Empty = skip scan.'
    required: false
    default: ''
  sonar-organization:
    description: 'SonarQube Cloud organization key (cloud edition; or set it in sonar-project.properties)'
    required: false
    default: ''
  project-base-dir:
    description: 'Base directory to analyze (and where sonar-project.properties is read from)'
    required: false
    default: '.'
  args:
    description: 'Additional -Dsonar.* arguments (one per line or space-separated)'
    required: false
    default: ''
  fail-on-quality-gate:
    description: 'Wait for and fail the step on a failing SonarQube Quality Gate'
    required: false
    default: 'false'
  cache:
    description: 'Cache the SonarQube scanner + analysis data between runs'
    required: false
    default: 'true'

outputs:
  executed:
    description: 'Whether the Sonar scan actually ran (true/false)'
    value: ${{ steps.guard.outputs.executed }}
  quality-gate:
    description: 'Quality Gate status when waited (PASSED/FAILED/unknown)'
    value: ${{ steps.result.outputs.quality-gate }}

runs:
  using: 'composite'
  steps:
    - name: 🔍 Guard — validate required inputs per edition
      id: guard
      shell: bash
      env:
        SONAR_EDITION: ${{ inputs.sonar-edition }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      run: |
        if [ -z "$SONAR_TOKEN" ]; then
          echo "::warning title=SonarQube skipped::SonarQube analysis was enabled but SONARQUBE_TOKEN is not set — skipping without failing the build."
          echo "executed=false" >> "$GITHUB_OUTPUT"
        elif [ "$SONAR_EDITION" = "server" ] && [ -z "$SONAR_HOST_URL" ]; then
          echo "::warning title=SonarQube skipped::server edition requires SONARQUBE_HOST_URL — skipping without failing the build."
          echo "executed=false" >> "$GITHUB_OUTPUT"
        else
          echo "✅ SonarQube ($SONAR_EDITION) inputs present — running analysis"
          echo "executed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: 🌐 Configure host (server / explicit URL)
      if: steps.guard.outputs.executed == 'true' && inputs.sonar-host-url != ''
      shell: bash
      env:
        HOST: ${{ inputs.sonar-host-url }}
      run: echo "SONAR_HOST_URL=$HOST" >> "$GITHUB_ENV"

    - name: 💾 Cache SonarQube data
      if: steps.guard.outputs.executed == 'true' && inputs.cache == 'true'
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.sonar
        key: sonar-${{ runner.os }}-${{ github.repository }}-${{ github.ref_name }}
        restore-keys: |
          sonar-${{ runner.os }}-${{ github.repository }}-
          sonar-${{ runner.os }}-

    - name: 🧮 Assemble scanner arguments
      id: args
      if: steps.guard.outputs.executed == 'true'
      shell: bash
      env:
        RAW_ARGS: ${{ inputs.args }}
        FAIL_QG: ${{ inputs.fail-on-quality-gate }}
        SONAR_EDITION: ${{ inputs.sonar-edition }}
        SONAR_ORG: ${{ inputs.sonar-organization }}
      run: |
        # Flatten any multiline args into a single space-separated string
        ARGS="$(printf '%s' "$RAW_ARGS" | tr '\n' ' ')"
        if [ "$SONAR_EDITION" = "cloud" ] && [ -n "$SONAR_ORG" ]; then
          ARGS="$ARGS -Dsonar.organization=$SONAR_ORG"
        fi
        if [ "$FAIL_QG" = "true" ]; then
          ARGS="$ARGS -Dsonar.qualitygate.wait=true"
        fi
        echo "value=$ARGS" >> "$GITHUB_OUTPUT"

    - name: 🛡️ SonarQube Scan
      id: scan
      if: steps.guard.outputs.executed == 'true'
      uses: SonarSource/sonarqube-scan-action@v8
      env:
        # SONAR_HOST_URL is exported via GITHUB_ENV for server / explicit URL;
        # for cloud it stays unset so the scanner targets SonarQube Cloud.
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_USER_HOME: ${{ github.workspace }}/.sonar
      with:
        projectBaseDir: ${{ inputs.project-base-dir }}
        args: ${{ steps.args.outputs.value }}

    - name: 📊 Result summary
      id: result
      if: always() && steps.guard.outputs.executed == 'true'
      shell: bash
      run: |
        QG="unknown"
        if [ "${{ inputs.fail-on-quality-gate }}" = "true" ]; then
          QG="${{ steps.scan.outcome == 'success' && 'PASSED' || 'FAILED' }}"
        fi
        echo "quality-gate=$QG" >> "$GITHUB_OUTPUT"

        {
          echo "### 🛡️ SonarQube Analysis"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| **Edition** | ${{ inputs.sonar-edition }} |"
          echo "| **Host** | ${{ inputs.sonar-host-url != '' && inputs.sonar-host-url || 'SonarQube Cloud' }} |"
          echo "| **Base dir** | \`${{ inputs.project-base-dir }}\` |"
          echo "| **Quality Gate wait** | ${{ inputs.fail-on-quality-gate }} |"
          echo "| **Quality Gate** | $QG |"
        } >> "$GITHUB_STEP_SUMMARY"

branding:
  icon: 'check-circle'
  color: 'blue'
