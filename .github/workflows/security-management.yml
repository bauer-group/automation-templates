name: 🛡️ Security Policy Management

# Security policy management workflow using modular components
# Automatically updates SECURITY.MD from template with current version information

on:
  push:
    branches: [main]
    paths:
      - 'docs/SECURITY.template.MD'
      - '.github/actions/security-generate/**'
      - '.github/workflows/security-management.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/SECURITY.template.MD'

  workflow_dispatch:
    inputs:
      force-update:
        description: 'Force SECURITY.MD update even without changes'
        type: boolean
        default: false
      custom-version:
        description: 'Custom version for SECURITY.MD'
        type: string
        default: ''
      policy-version:
        description: 'Security policy version (semantic versioning: x.y.z)'
        type: string
        default: '1.0.0'
  
  workflow_call:
    inputs:
      tag-name:
        description: 'Tag name that triggered the security policy update'
        type: string
        required: false
        default: ''
      force-update:
        description: 'Force SECURITY.MD update even without changes'
        type: boolean
        required: false
        default: false
      custom-version:
        description: 'Custom version for SECURITY.MD'
        type: string
        required: false
        default: ''
      policy-version:
        description: 'Security policy version (semantic versioning: x.y.z)'
        type: string
        required: false
        default: '1.0.0'
      runs-on:
        description: 'Runner to use. Use string for GitHub-hosted (e.g., "ubuntu-latest") or JSON array for self-hosted (e.g., ["self-hosted", "linux"])'
        required: false
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: write
  pull-requests: write

jobs:
  # Generate SECURITY.MD using the security-generate action
  generate-security-policy:
    name: Generate Security Policy
    runs-on: ${{ (github.event_name == 'workflow_call' && startsWith(inputs.runs-on, '[') && fromJSON(inputs.runs-on)) || (github.event_name == 'workflow_call' && inputs.runs-on) || 'ubuntu-latest' }}
    outputs:
      should_run: ${{ steps.should-run.outputs.should_run }}
      security_updated: ${{ steps.generate.outputs.security_updated || 'false' }}
      changes_detected: ${{ steps.generate.outputs.changes_detected || 'false' }}
      validation_passed: ${{ steps.generate.outputs.validation_passed || steps.should-run.outputs.should_run == 'false' && 'skipped' || 'false' }}
      current_version: ${{ steps.generate.outputs.current_version }}
      policy_version: ${{ steps.generate.outputs.policy_version }}
      next_review_date: ${{ steps.generate.outputs.next_review_date }}
    
    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Check if workflow should run
        id: should-run
        run: |
          echo "🔍 Determining if security policy workflow should run..."
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref Type: ${{ github.ref_type }}"
          echo "Force Update: ${{ inputs.force-update }}"
          
          # Always run if force-update is true (from manual trigger)
          if [[ "${{ inputs.force-update }}" == "true" ]]; then
            echo "🔄 ✅ FORCE UPDATE ENABLED - will run regardless of other conditions"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Always run for tags - update SECURITY with new version
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "🏷️ ✅ RUNNING FOR TAG: ${{ github.ref_name }}"
            echo "🏷️ Updating SECURITY policy with new version information"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Always run for workflow_call (called by other workflows)
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "✅ Running for workflow call"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Always run for workflow_dispatch (manual trigger)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "✅ Running for manual trigger"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Always run for pull requests
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "✅ Running for pull request"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # For push events to main, workflow should trigger based on paths filter
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "✅ Running for push to main (paths filter applies automatically)"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Default fallback
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "skip_reason=" >> $GITHUB_OUTPUT

      - name: 🔍 Validate Prerequisites
        if: steps.should-run.outputs.should_run == 'true'
        run: |
          TEMPLATE_FILE="${{ inputs.template-path || 'docs/SECURITY.template.MD' }}"
          
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "❌ Template file not found: $TEMPLATE_FILE"
            echo "💡 Available template files:"
            find . -name "*.template.*" -type f | head -10
            exit 1
          fi
          
          echo "✅ Template file found: $TEMPLATE_FILE"

      - name: 🛡️ Generate Professional Security Policy
        id: generate
        if: steps.should-run.outputs.should_run == 'true'
        uses: bauer-group/automation-templates/.github/actions/security-generate@main
        with:
          config-file: '.github/config/security-policy/config.yml'
          force-update: ${{ inputs.force-update || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_call' }}
          custom-version: ${{ inputs.custom-version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || (github.event_name == 'workflow_call' && inputs.tag-name) || '' }}
          policy-version: ${{ inputs.policy-version || '' }}

      - name: 🛡️ Commit and Push Changes
        if: steps.should-run.outputs.should_run == 'true' && steps.generate.outputs.changes_detected == 'true' && github.event_name != 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "🛡️ Security Policy Bot"
          
          COMMIT_MSG="docs: update SECURITY.MD"
          
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            COMMIT_MSG="$COMMIT_MSG for tag ${{ github.ref_name }} [automated]"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force-update }}" = "true" ]; then
              COMMIT_MSG="$COMMIT_MSG (forced update)"
            fi
            if [ -n "${{ inputs.custom-version }}" ]; then
              COMMIT_MSG="$COMMIT_MSG (version ${{ inputs.custom-version }})"
            fi
            if [ -n "${{ inputs.policy-version }}" ]; then
              COMMIT_MSG="$COMMIT_MSG (policy v${{ inputs.policy-version }})"
            fi
          fi
          
          COMMIT_MSG="$COMMIT_MSG [automated]"
          
          # Save the generated SECURITY before any git operations
          cp SECURITY.MD SECURITY.MD.generated
          
          # Clean up any existing git state and sync with remote
          git rebase --abort || true
          git merge --abort || true
          git fetch origin main

          # Try merge and push with retry logic (handles concurrent
          # auto-commit workflows racing to push to main)
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES"

            # Fresh fetch before each attempt
            git fetch origin main

            # Try merge
            if ! git merge origin/main --no-edit; then
              echo "Merge conflict detected, resolving..."
              # Restore our generated version
              cp SECURITY.MD.generated SECURITY.MD
              git add SECURITY.MD
              git commit -m "$COMMIT_MSG"
            else
              echo "Clean merge successful"
              # Restore our generated version (merge may have overwritten it)
              cp SECURITY.MD.generated SECURITY.MD
              git add SECURITY.MD

              # Only commit if there are changes
              if git diff --staged --quiet; then
                echo "No changes to commit after merge"
                break
              else
                git commit -m "$COMMIT_MSG"
              fi
            fi

            # Try push
            if git push origin main; then
              echo "✅ Push successful"
              break
            else
              echo "⚠️ Push failed, retrying..."
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting 5 seconds before retry..."
                sleep 5
                # Reset to clean state for retry
                git reset --hard HEAD~1
              else
                echo "❌ Failed to push after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done

          # Clean up
          rm -f SECURITY.MD.generated

  # Validate security policy structure and content
  validate-security-policy:
    name: Validate Security Policy
    needs: generate-security-policy
    if: needs.generate-security-policy.outputs.should_run == 'true'
    runs-on: ${{ (github.event_name == 'workflow_call' && startsWith(inputs.runs-on, '[') && fromJSON(inputs.runs-on)) || (github.event_name == 'workflow_call' && inputs.runs-on) || 'ubuntu-latest' }}
    
    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v6

      - name: 🔍 Validate Security Policy Structure
        run: |
          echo "🔍 Validating security policy structure..."
          
          # Check for required security policy sections
          REQUIRED_SECTIONS=(
            "Reporting Security Vulnerabilities"
            "Supported Versions"
            "Security Measures"
            "Emergency Contacts"
          )
          
          MISSING_SECTIONS=()
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "$section" SECURITY.MD; then
              MISSING_SECTIONS+=("$section")
            fi
          done
          
          if [ ${#MISSING_SECTIONS[@]} -gt 0 ]; then
            echo "❌ Missing required sections:"
            for section in "${MISSING_SECTIONS[@]}"; do
              echo "  - $section"
            done
            exit 1
          else
            echo "✅ All required sections found"
          fi

      - name: 🔗 Check Security Policy Links
        run: |
          echo "🔗 Checking security policy links..."
          
          # Check for broken internal links in SECURITY.MD
          if [ -f "SECURITY.MD" ]; then
            echo "Checking SECURITY.MD for broken internal links..."
            
            # Extract relative links
            grep -o "]\(\./[^)]*\)" SECURITY.MD | while read -r link; do
              file_path=$(echo "$link" | sed 's/](\.\///; s/)//')
              
              # Skip anchor links for now
              if [[ "$file_path" == *"#"* ]]; then
                file_path=$(echo "$file_path" | cut -d'#' -f1)
              fi
              
              if [ -n "$file_path" ] && [ ! -f "$file_path" ] && [ ! -d "$file_path" ]; then
                echo "⚠️ Potentially broken link: $link -> $file_path"
              fi
            done || echo "No relative links found or all links valid"
          fi

      - name: 📊 Security Policy Summary
        run: |
          echo "### 🛡️ Security Policy Management Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if workflow should have run
          if [ "${{ needs.generate-security-policy.outputs.should_run }}" = "false" ]; then
            echo "ℹ️ **Workflow skipped - no relevant files changed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No security policy related files were modified in this push." >> $GITHUB_STEP_SUMMARY
          else
            echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Security Policy Generated** | ${{ needs.generate-security-policy.outputs.security_updated == 'true' && '✅ Updated' || '⏭️ No changes' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Template Validation** | ${{ needs.generate-security-policy.outputs.validation_passed == 'true' && '✅ Passed' || needs.generate-security-policy.outputs.validation_passed == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Link Validation** | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
            echo "| **Structure Check** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.generate-security-policy.outputs.security_updated }}" = "true" ]; then
            echo "🛡️ **Security policy updated successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Policy Details:**" >> $GITHUB_STEP_SUMMARY
            echo "- Version: ${{ needs.generate-security-policy.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- Policy Version: ${{ needs.generate-security-policy.outputs.policy_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- Next Review: ${{ needs.generate-security-policy.outputs.next_review_date }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "🏷️ **Tag Details:**" >> $GITHUB_STEP_SUMMARY
              echo "- Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
              echo "- Ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
              echo "- Triggered by: Tag push" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ **No security policy updates required**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🧩 **Modular Components Used:**" >> $GITHUB_STEP_SUMMARY
          echo "- Security Policy Generator Action: [actions/security-generate](.github/actions/security-generate/)" >> $GITHUB_STEP_SUMMARY
          echo "- Security Template: [docs/SECURITY.template.MD](docs/SECURITY.template.MD)" >> $GITHUB_STEP_SUMMARY